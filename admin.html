<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin — B7Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1D4FFE' },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .tab-active { border-bottom: 2px solid #1D4FFE; color: #1D4FFE; font-weight: 600; }
        .modal-overlay { transition: opacity 0.2s ease; }
        .modal-box { transition: transform 0.25s ease, opacity 0.25s ease; }
        .modal-overlay.hidden .modal-box { transform: translateY(16px); opacity: 0; }
        input, textarea, select {
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #1D4FFE !important;
            box-shadow: 0 0 0 3px rgba(29,79,254,0.1);
        }
        .btn-primary { background:#1D4FFE; color:#fff; font-weight:700; border-radius:8px; padding:10px 24px; font-size:14px; transition:background 0.15s,transform 0.1s; }
        .btn-primary:hover { background:#1640d6; }
        .btn-primary:active { transform:scale(0.97); }
        .btn-secondary { background:#F3F4F6; color:#111; font-weight:600; border-radius:8px; padding:10px 24px; font-size:14px; transition:background 0.15s; }
        .btn-secondary:hover { background:#E5E7EB; }
        .btn-danger { background:#FEF2F2; color:#EF4444; font-weight:700; border-radius:8px; padding:10px 24px; font-size:14px; transition:background 0.15s; }
        .btn-danger:hover { background:#FEE2E2; }
        .form-label { display:block; font-size:12px; font-weight:600; color:#374151; margin-bottom:4px; }
        .form-input { width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:9px 12px; font-size:14px; color:#111; background:#fff; }
        .form-input::placeholder { color:#9CA3AF; }
    </style>
</head>
<body class="bg-[#F9F9F9] font-sans min-h-screen">

    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-[1200px] mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="assets/images/ui/logo-black.png" alt="B7Store" class="h-8">
                <span class="bg-gray-100 text-[10px] font-bold uppercase px-2 py-1 rounded">Painel Admin</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right hidden sm:block">
                    <p id="admin-name" class="text-sm font-bold text-black">-</p>
                    <p id="admin-email" class="text-xs text-gray-500">-</p>
                </div>
                <button id="btn-logout" class="text-sm font-bold text-red-500 hover:underline">Sair</button>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="max-w-[1200px] mx-auto px-6 py-10">

        <!-- Stats -->
        <div id="stats-row" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10"></div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-200 mb-8 gap-8">
            <button onclick="switchTab('products')" id="tab-products" class="pb-4 text-sm tab-active">Produtos</button>
            <button onclick="switchTab('categories')" id="tab-categories" class="pb-4 text-sm text-gray-500 hover:text-black">Categorias</button>
        </div>

        <!-- Produtos -->
        <section id="sec-products" class="block">
            <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                <h2 class="text-xl font-bold">Gestão de Produtos</h2>
                <button onclick="openProductModal()" class="btn-primary">+ Novo Produto</button>
            </div>
            <div id="products-list" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- Categorias -->
        <section id="sec-categories" class="hidden">
            <div class="flex justify-between items-center mb-6 gap-4">
                <h2 class="text-xl font-bold">Gestão de Categorias</h2>
                <button onclick="openCategoryModal()" class="btn-primary">+ Nova Categoria</button>
            </div>
            <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b border-gray-200 text-xs font-bold uppercase text-gray-500">
                        <tr>
                            <th class="px-6 py-4">Nome da Categoria</th>
                            <th class="px-6 py-4">Slug</th>
                            <th class="px-6 py-4 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="categories-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- MODAL: PRODUTO                                  -->
    <!-- ═══════════════════════════════════════════════ -->
    <div id="modal-product" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(0,0,0,0.45);">
        <div class="modal-box bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center px-8 py-6 border-b border-gray-100">
                <h3 id="modal-product-title" class="text-lg font-bold">Novo Produto</h3>
                <button onclick="closeProductModal()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
            </div>
            <form id="form-product" class="px-8 py-6 grid grid-cols-1 md:grid-cols-2 gap-5">
                <input type="hidden" id="product-id">

                <div>
                    <label class="form-label">Código *</label>
                    <input id="product-code" class="form-input" placeholder="Ex: CAMISETA-001" required>
                </div>
                <div>
                    <label class="form-label">Nome *</label>
                    <input id="product-name" class="form-input" placeholder="Nome do produto" required>
                </div>

                <div class="md:col-span-2">
                    <label class="form-label">Descrição</label>
                    <textarea id="product-description" class="form-input" rows="3" placeholder="Descrição detalhada do produto..."></textarea>
                </div>

                <div>
                    <label class="form-label">Preço (R$) *</label>
                    <input id="product-price" type="number" min="0" step="0.01" class="form-input" placeholder="0.00" required>
                </div>
                <div>
                    <label class="form-label">Preço De (R$) <span class="text-gray-400 font-normal">opcional</span></label>
                    <input id="product-price-from" type="number" min="0" step="0.01" class="form-input" placeholder="0.00">
                </div>

                <div>
                    <label class="form-label">Estoque</label>
                    <input id="product-stock" type="number" min="0" class="form-input" placeholder="0">
                </div>
                <div>
                    <label class="form-label">Categoria</label>
                    <select id="product-category" class="form-input">
                        <option value="">Sem categoria</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="form-label">URL da Imagem</label>
                    <input id="product-image" class="form-input" placeholder="https://...">
                    <div id="product-image-preview" class="mt-2 hidden">
                        <img id="product-image-preview-img" src="" class="h-24 rounded-lg object-cover border border-gray-200">
                    </div>
                </div>

                <div>
                    <label class="form-label">Tamanhos <span class="text-gray-400 font-normal">(separados por vírgula)</span></label>
                    <input id="product-sizes" class="form-input" placeholder="P, M, G, GG">
                </div>
                <div>
                    <label class="form-label">Tags <span class="text-gray-400 font-normal">(separadas por vírgula)</span></label>
                    <input id="product-tags" class="form-input" placeholder="novo, destaque, promoção">
                </div>

                <div class="md:col-span-2 flex items-center gap-3">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="product-active" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                    <span class="text-sm font-medium text-gray-700">Produto ativo</span>
                </div>

                <div id="product-form-error" class="md:col-span-2 hidden text-red-500 text-sm font-medium bg-red-50 rounded-lg px-4 py-3"></div>
            </form>
            <div class="px-8 py-5 border-t border-gray-100 flex justify-end gap-3">
                <button onclick="closeProductModal()" class="btn-secondary">Cancelar</button>
                <button id="btn-save-product" onclick="handleSaveProduct()" class="btn-primary">Salvar Produto</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- MODAL: CATEGORIA                                -->
    <!-- ═══════════════════════════════════════════════ -->
    <div id="modal-category" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(0,0,0,0.45);">
        <div class="modal-box bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div class="flex justify-between items-center px-8 py-6 border-b border-gray-100">
                <h3 id="modal-category-title" class="text-lg font-bold">Nova Categoria</h3>
                <button onclick="closeCategoryModal()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
            </div>
            <form id="form-category" class="px-8 py-6">
                <input type="hidden" id="category-id">
                <label class="form-label">Nome da Categoria *</label>
                <input id="category-name" class="form-input" placeholder="Ex: Camisetas" required>
                <div id="category-form-error" class="hidden text-red-500 text-sm font-medium bg-red-50 rounded-lg px-4 py-3 mt-3"></div>
            </form>
            <div class="px-8 py-5 border-t border-gray-100 flex justify-end gap-3">
                <button onclick="closeCategoryModal()" class="btn-secondary">Cancelar</button>
                <button id="btn-save-category" onclick="handleSaveCategory()" class="btn-primary">Salvar Categoria</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- MODAL: CONFIRMAÇÃO DE EXCLUSÃO                  -->
    <!-- ═══════════════════════════════════════════════ -->
    <div id="modal-confirm" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(0,0,0,0.45);">
        <div class="modal-box bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 text-center">
            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </div>
            <h3 class="text-lg font-bold mb-2">Confirmar exclusão</h3>
            <p id="confirm-message" class="text-gray-500 text-sm mb-6">Tem certeza que deseja excluir este item? Esta ação não pode ser desfeita.</p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeConfirmModal()" class="btn-secondary">Cancelar</button>
                <button id="btn-confirm-delete" class="btn-danger">Excluir</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- TOAST NOTIFICATION                              -->
    <!-- ═══════════════════════════════════════════════ -->
    <div id="toast" class="fixed bottom-6 right-6 z-[999] hidden">
        <div id="toast-inner" class="flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg text-sm font-semibold text-white min-w-[200px]">
            <span id="toast-icon"></span>
            <span id="toast-msg"></span>
        </div>
    </div>

    <script type="module">
        import {
            checkAuth, adminLogout, getAdminStats, getAdminProducts, getAdminProduct,
            deleteProduct, getAdminCategories, saveProduct, saveCategory,
            deleteCategory, formatPrice
        } from './assets/js/admin.js';

        // ─── AUTH ────────────────────────────────────────────────
        checkAuth();
        document.getElementById('admin-name').textContent = localStorage.getItem('b7admin_name');
        document.getElementById('admin-email').textContent = localStorage.getItem('b7admin_email');
        document.getElementById('btn-logout').onclick = adminLogout;

        // ─── STATE ───────────────────────────────────────────────
        let allCategories = [];

        // ─── TOAST ───────────────────────────────────────────────
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const inner = document.getElementById('toast-inner');
            const icon  = document.getElementById('toast-icon');
            document.getElementById('toast-msg').textContent = msg;
            icon.textContent = type === 'success' ? '✓' : '✕';
            inner.className = `flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg text-sm font-semibold text-white min-w-[200px] ${type === 'success' ? 'bg-green-600' : 'bg-red-500'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // ─── MODAL HELPERS ───────────────────────────────────────
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // ─── STATS ───────────────────────────────────────────────
        async function renderStats() {
            const stats = await getAdminStats();
            const container = document.getElementById('stats-row');
            const items = [
                { label: 'Total Produtos', val: stats.totalProducts, color: 'text-primary' },
                { label: 'Ativos',         val: stats.activeProducts,   color: 'text-green-600' },
                { label: 'Inativos',       val: stats.inactiveProducts, color: 'text-gray-400' },
                { label: 'Categorias',     val: stats.totalCategories,  color: 'text-orange-500' },
            ];
            container.innerHTML = items.map(i => `
                <div class="bg-white border border-gray-200 p-6 rounded-xl">
                    <p class="text-xs font-bold text-gray-500 uppercase mb-1">${i.label}</p>
                    <p class="text-3xl font-black ${i.color}">${i.val}</p>
                </div>
            `).join('');
        }

        // ─── PRODUCTS ────────────────────────────────────────────
        async function loadProducts() {
            const list = document.getElementById('products-list');
            list.innerHTML = '<p class="col-span-4 text-gray-400 text-center py-10">A carregar produtos...</p>';
            try {
                const data = await getAdminProducts({ limit: 50 });
                if (!data) { list.innerHTML = '<p class="col-span-4 text-red-400 text-center py-10">Erro ao carregar produtos.</p>'; return; }
                const products = data.data ?? data;
                if (!products || products.length === 0) {
                    list.innerHTML = '<p class="col-span-4 text-gray-400 text-center py-10">Nenhum produto cadastrado ainda.</p>';
                    return;
                }
                list.innerHTML = products.map(p => `
                    <div class="bg-white border border-gray-200 rounded-xl p-4 flex flex-col hover:shadow-md transition-shadow">
                        <div class="relative mb-4">
                            <img src="${p.image_url || 'https://placehold.co/400x400?text=Sem+Imagem'}"
                                 onerror="this.src='https://placehold.co/400x400?text=Sem+Imagem'"
                                 class="w-full aspect-square object-cover rounded-lg bg-gray-50">
                            <span class="absolute top-2 right-2 text-[10px] px-2 py-0.5 rounded-full font-bold ${p.active ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-500'}">
                                ${p.active ? 'Ativo' : 'Inativo'}
                            </span>
                        </div>
                        <p class="font-bold text-sm mb-0.5 truncate" title="${p.name}">${p.name}</p>
                        <p class="text-[11px] text-gray-400 mb-1">${p.categories?.name ?? 'Sem categoria'}</p>
                        <p class="text-primary font-bold text-sm mb-4">${formatPrice(p.price)}</p>
                        <div class="mt-auto flex gap-2">
                            <button onclick="window.handleEditProduct('${p.id}')"
                                class="flex-1 bg-gray-100 py-2 rounded-lg text-xs font-bold hover:bg-gray-200 transition">
                                ✏️ Editar
                            </button>
                            <button onclick="window.handleDeleteProduct('${p.id}', '${p.name.replace(/'/g,"\\'")}' )"
                                class="px-3 bg-red-50 text-red-500 py-2 rounded-lg hover:bg-red-100 transition text-xs font-bold">
                                🗑
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                list.innerHTML = '<p class="col-span-4 text-red-400 text-center py-10">Erro inesperado ao carregar produtos.</p>';
            }
        }

        // ─── CATEGORIES ──────────────────────────────────────────
        async function loadCategories() {
            const tbody = document.getElementById('categories-table-body');
            try {
                const cats = await getAdminCategories();
                allCategories = cats || [];
                if (!cats || cats.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-gray-400">Nenhuma categoria cadastrada.</td></tr>';
                    return;
                }
                tbody.innerHTML = cats.map(c => `
                    <tr class="border-b border-gray-100 last:border-0 hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-semibold text-sm">${c.name}</td>
                        <td class="px-6 py-4 text-gray-400 text-xs font-mono">${c.slug}</td>
                        <td class="px-6 py-4 text-right flex justify-end gap-2">
                            <button onclick="window.handleEditCategory('${c.id}', '${c.name.replace(/'/g,"\\'")}' )"
                                class="text-primary text-xs font-bold px-3 py-1.5 rounded-lg bg-blue-50 hover:bg-blue-100 transition">
                                ✏️ Editar
                            </button>
                            <button onclick="window.handleDeleteCategory('${c.id}', '${c.name.replace(/'/g,"\\'")}' )"
                                class="text-red-500 text-xs font-bold px-3 py-1.5 rounded-lg bg-red-50 hover:bg-red-100 transition">
                                🗑 Excluir
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-red-400">Erro ao carregar categorias.</td></tr>';
            }
        }

        // ─── DASHBOARD ───────────────────────────────────────────
        async function loadDashboard() {
            await loadCategories();   // carrega categorias primeiro (usadas no select do produto)
            await Promise.all([renderStats(), loadProducts()]);
        }

        // ═══════════════════════════════════════════════
        // MODAL PRODUTO
        // ═══════════════════════════════════════════════

        function fillCategorySelect(selectedId = '') {
            const sel = document.getElementById('product-category');
            sel.innerHTML = '<option value="">Sem categoria</option>' +
                allCategories.map(c =>
                    `<option value="${c.id}" ${c.id == selectedId ? 'selected' : ''}>${c.name}</option>`
                ).join('');
        }

        window.openProductModal = function(product = null) {
            document.getElementById('modal-product-title').textContent = product ? 'Editar Produto' : 'Novo Produto';
            document.getElementById('product-id').value          = product?.id ?? '';
            document.getElementById('product-code').value        = product?.code ?? '';
            document.getElementById('product-name').value        = product?.name ?? '';
            document.getElementById('product-description').value = product?.description ?? '';
            document.getElementById('product-price').value       = product?.price ?? '';
            document.getElementById('product-price-from').value  = product?.price_from ?? '';
            document.getElementById('product-stock').value       = product?.stock ?? '';
            document.getElementById('product-image').value       = product?.image_url ?? '';
            document.getElementById('product-sizes').value       = (product?.sizes ?? []).join(', ');
            document.getElementById('product-tags').value        = (product?.tags ?? []).join(', ');
            document.getElementById('product-active').checked    = product ? product.active : true;
            document.getElementById('product-form-error').classList.add('hidden');
            fillCategorySelect(product?.category_id);

            // preview de imagem
            const img = product?.image_url;
            const preview = document.getElementById('product-image-preview');
            const previewImg = document.getElementById('product-image-preview-img');
            if (img) { previewImg.src = img; preview.classList.remove('hidden'); }
            else { preview.classList.add('hidden'); }

            openModal('modal-product');
        };

        // atualiza preview ao digitar URL
        document.getElementById('product-image').addEventListener('input', function() {
            const val = this.value.trim();
            const preview = document.getElementById('product-image-preview');
            const previewImg = document.getElementById('product-image-preview-img');
            if (val) { previewImg.src = val; preview.classList.remove('hidden'); }
            else { preview.classList.add('hidden'); }
        });

        window.closeProductModal = function() { closeModal('modal-product'); };

        window.handleSaveProduct = async function() {
            const btn = document.getElementById('btn-save-product');
            const errBox = document.getElementById('product-form-error');
            errBox.classList.add('hidden');

            const id          = document.getElementById('product-id').value || null;
            const code        = document.getElementById('product-code').value.trim();
            const name        = document.getElementById('product-name').value.trim();
            const description = document.getElementById('product-description').value.trim();
            const price       = document.getElementById('product-price').value;
            const price_from  = document.getElementById('product-price-from').value;
            const stock       = document.getElementById('product-stock').value;
            const category_id = document.getElementById('product-category').value;
            const image_url   = document.getElementById('product-image').value.trim();
            const sizesRaw    = document.getElementById('product-sizes').value;
            const tagsRaw     = document.getElementById('product-tags').value;
            const active      = document.getElementById('product-active').checked;

            if (!code || !name || !price) {
                errBox.textContent = 'Preencha os campos obrigatórios: Código, Nome e Preço.';
                errBox.classList.remove('hidden');
                return;
            }

            const sizes = sizesRaw ? sizesRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
            const tags  = tagsRaw  ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

            const payload = {
                code, name, description,
                price: Number(price),
                price_from: price_from ? Number(price_from) : null,
                stock: stock ? Number(stock) : 0,
                category_id: category_id || null,
                image_url: image_url || null,
                sizes, tags, active
            };

            btn.disabled = true;
            btn.textContent = 'Salvando...';
            try {
                const res = await saveProduct(payload, id);
                if (!res || !res.ok) {
                    const err = res ? await res.json() : {};
                    errBox.textContent = err.error || 'Erro ao salvar produto.';
                    errBox.classList.remove('hidden');
                    return;
                }
                closeProductModal();
                showToast(id ? 'Produto atualizado!' : 'Produto criado!');
                loadDashboard();
            } catch (e) {
                errBox.textContent = e.message || 'Erro inesperado.';
                errBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salvar Produto';
            }
        };

        window.handleEditProduct = async function(id) {
            try {
                const product = await getAdminProduct(id);
                if (!product) { showToast('Erro ao carregar produto.', 'error'); return; }
                openProductModal(product);
            } catch(e) {
                showToast('Erro ao carregar produto.', 'error');
            }
        };

        window.handleDeleteProduct = function(id, name) {
            document.getElementById('confirm-message').textContent =
                `Tem certeza que deseja excluir o produto "${name}"? Esta ação não pode ser desfeita.`;
            document.getElementById('btn-confirm-delete').onclick = async () => {
                closeConfirmModal();
                await deleteProduct(id);
                showToast('Produto excluído!');
                loadDashboard();
            };
            openModal('modal-confirm');
        };

        // ═══════════════════════════════════════════════
        // MODAL CATEGORIA
        // ═══════════════════════════════════════════════

        window.openCategoryModal = function(id = null, name = '') {
            document.getElementById('modal-category-title').textContent = id ? 'Editar Categoria' : 'Nova Categoria';
            document.getElementById('category-id').value   = id ?? '';
            document.getElementById('category-name').value = name;
            document.getElementById('category-form-error').classList.add('hidden');
            openModal('modal-category');
            setTimeout(() => document.getElementById('category-name').focus(), 100);
        };

        window.closeCategoryModal = function() { closeModal('modal-category'); };

        window.handleSaveCategory = async function() {
            const btn    = document.getElementById('btn-save-category');
            const errBox = document.getElementById('category-form-error');
            errBox.classList.add('hidden');

            const id   = document.getElementById('category-id').value || null;
            const name = document.getElementById('category-name').value.trim();

            if (!name) {
                errBox.textContent = 'O nome da categoria é obrigatório.';
                errBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Salvando...';
            try {
                const res = await saveCategory(name, id);
                if (!res || !res.ok) {
                    const err = res ? await res.json() : {};
                    errBox.textContent = err.error || 'Erro ao salvar categoria.';
                    errBox.classList.remove('hidden');
                    return;
                }
                closeCategoryModal();
                showToast(id ? 'Categoria atualizada!' : 'Categoria criada!');
                loadDashboard();
            } catch(e) {
                errBox.textContent = e.message || 'Erro inesperado.';
                errBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salvar Categoria';
            }
        };

        window.handleEditCategory = function(id, name) {
            openCategoryModal(id, name);
        };

        window.handleDeleteCategory = function(id, name) {
            document.getElementById('confirm-message').textContent =
                `Tem certeza que deseja excluir a categoria "${name}"? Esta ação não pode ser desfeita.`;
            document.getElementById('btn-confirm-delete').onclick = async () => {
                closeConfirmModal();
                await deleteCategory(id);
                showToast('Categoria excluída!');
                loadDashboard();
            };
            openModal('modal-confirm');
        };

        // ═══════════════════════════════════════════════
        // MODAL CONFIRMAÇÃO
        // ═══════════════════════════════════════════════
        window.closeConfirmModal = function() { closeModal('modal-confirm'); };

        // Fecha modais ao clicar no overlay
        ['modal-product', 'modal-category', 'modal-confirm'].forEach(id => {
            document.getElementById(id).addEventListener('click', function(e) {
                if (e.target === this) closeModal(id);
            });
        });

        // ─── TABS ────────────────────────────────────────────────
        window.switchTab = function(tab) {
            const isProd = tab === 'products';
            document.getElementById('sec-products').classList.toggle('hidden', !isProd);
            document.getElementById('sec-categories').classList.toggle('hidden', isProd);
            document.getElementById('tab-products').className   = isProd  ? 'pb-4 text-sm tab-active' : 'pb-4 text-sm text-gray-500 hover:text-black';
            document.getElementById('tab-categories').className = !isProd ? 'pb-4 text-sm tab-active' : 'pb-4 text-sm text-gray-500 hover:text-black';
        };

        // ─── INIT ────────────────────────────────────────────────
        loadDashboard();
    </script>
</body>
</html>
