<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — B7Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1D4FFE' },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F9F9F9] font-sans min-h-screen flex flex-col">

    <div class="bg-black text-white py-4 text-center text-sm font-bold tracking-wide">
        PAINEL ADMINISTRATIVO — B7Store
    </div>

    <main class="flex-1 flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-[400px] bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
            <h1 class="text-2xl font-bold text-black mb-2">Bem-vindo de volta</h1>
            <p class="text-gray-500 mb-8">Introduza os seus dados para aceder ao painel.</p>

            <div id="error-msg" class="hidden mb-6 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
                Credenciais inválidas.
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">E-mail</label>
                    <input type="email" id="email" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors" placeholder="admin@b7store.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Palavra-passe</label>
                    <input type="password" id="password" class="w-full h-12 px-4 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors" placeholder="••••••••">
                </div>
                <button id="btn-login" class="w-full h-14 bg-primary text-white font-bold rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
                    Entrar no painel
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { adminLogin } from './assets/js/admin.js';

        // Redireciona se já estiver logado
        if (localStorage.getItem('b7admin_token')) {
            window.location.href = 'admin.html';
        }

        const btn = document.getElementById('btn-login');
        const errorMsg = document.getElementById('error-msg');

        async function tryLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) return;

            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = 'Verificando...';

            try {
                await adminLogin(email, password);
                window.location.href = 'admin.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Entrar no painel';
                document.getElementById('password').value = '';
            }
        }

        btn.addEventListener('click', tryLogin);
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') tryLogin() });
    </script>
</body>
</html>
